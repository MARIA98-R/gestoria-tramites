<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R&B GESTORIA ADMINISTRATIVA</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0a1a2a; 
            --secondary: #1a3a5a;
            --accent: #c5a059; 
            --light: #f8f9fa;
            --white: #ffffff;
            --whatsapp: #25d366;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--light);
            margin: 0;
            padding: 0;
            color: var(--primary);
        }

        header {
            background-color: var(--primary);
            color: var(--white);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 5px solid var(--accent);
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            color: var(--accent);
            margin: 0;
        }

        .sub-header {
            font-weight: 300;
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .contact-info-top {
            font-size: 0.9rem;
            color: var(--accent);
            text-decoration: none;
        }

        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 20px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-bottom: 40px;
        }

        .btn-main {
            background: var(--white);
            border: 1px solid #ddd;
            padding: 15px 5px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .btn-main.active {
            background: var(--primary);
            color: var(--white);
            border-color: var(--primary);
        }

        .content-panel {
            display: none;
            background: var(--white);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .list-items {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .item-card {
            background: #fdfdfd;
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
            gap: 10px;
        }

        .item-card span { font-size: 0.95rem; line-height: 1.4; }

        .btn-consultar {
            background-color: var(--whatsapp);
            color: white;
            text-decoration: none;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        .btn-whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--whatsapp);
            width: 60px; height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 1000;
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #777;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        @media (max-width: 600px) {
            .logo-text { font-size: 2.5rem; }
            .list-items { grid-template-columns: 1fr; }
            .item-card { flex-direction: column; align-items: flex-start; }
            .btn-consultar { width: 100%; justify-content: center; margin-top: 10px; }
        }
    </style>
</head>
<body>

        <div class="logo-text">R&B</div>
        <div class="sub-header">Gestoría Administrativa</div>
        <a href="mailto:GestionintegralRyB@gmail.com" class="contact-info-top">GestionintegralRyB@gmail.com</a>
    </header>
